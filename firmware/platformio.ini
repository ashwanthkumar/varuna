; Varuna — ESP32 Pump Controller firmware
; Target board: ESP32 NodeMCU 30-pin (WROOM-32 + CP2102), e.g. Robocraze.
; Build/upload from inside firmware/:  pio run -t upload && pio device monitor
;
; OTA: after the first wired flash, subsequent builds can be pushed over WiFi.
; Uncomment the [env:esp32-ota] block and set upload_port to the board IP / hostname.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; OTA-capable layout: two app partitions + NVS + SPIFFS.
board_build.partitions = default.csv

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DVARUNA_FW_VERSION=\"1.0.0\"

; PubSubClient = optional MQTT (Home Assistant / Node-RED). The web UI works
; without a broker; MQTT only activates when a broker is configured at runtime.
lib_deps =
    knolleary/PubSubClient @ ^2.8

; ── Wireless upload (enable after first wired flash) ─────────────────────────
; [env:esp32-ota]
; extends = env:esp32dev
; upload_protocol = espota
; upload_port = varuna.local        ; or the board's IP address
; upload_flags =
;     --auth=varuna-ota             ; must match Config.otaPassword
